<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משחק קלפים - מצבי צבירה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Rubik', sans-serif;
            background-color: #a7f3d0; /* צבע רקע תואם למצגת */
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 20px, transparent 20px, transparent 40px);
            overflow: hidden;
        }

        /* סגנון קומיקס */
        .comic-border {
            border: 4px solid #000;
            box-shadow: 6px 6px 0px #000;
            border-radius: 12px;
        }

        .comic-title {
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            letter-spacing: 2px;
        }

        .card-container {
            perspective: 1000px;
            width: 100%;
            max-width: 600px;
            height: 300px;
            margin: 0 auto;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-color: white;
            border: 5px solid #000;
            border-radius: 20px;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.8);
        }

        .card-front {
            background-color: #fef08a; /* צהוב קומיקס */
        }

        .card-back {
            background-color: #bfdbfe; /* תכלת */
            transform: rotateY(180deg);
        }

        .btn-comic {
            transition: transform 0.1s, box-shadow 0.1s;
            cursor: pointer;
        }
        
        .btn-comic:active {
            transform: translate(4px, 4px) !important;
            box-shadow: 2px 2px 0px #000 !important;
        }
        
        .btn-comic:hover {
            transform: scale(1.05);
        }

        .number-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #000;
            color: #fff;
            font-weight: 900;
            font-size: 1.25rem;
            margin-left: 8px;
        }

        /* אנימציית רעידה לטעות */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        
        .shake-animation {
            animation: shake 0.4s ease-in-out;
        }
        
        /* אפקט חגיגה */
        .celebrate {
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col p-4 md:p-8">

    <!-- כותרת, מד נקודות והוראות -->
    <header class="text-center mb-6">
        <h1 class="text-4xl md:text-5xl font-black text-yellow-400 comic-title mb-2">משחק מצבי צבירה!</h1>
        <div class="flex flex-wrap justify-center items-center gap-4 mb-4">
            <p class="text-lg md:text-xl font-bold bg-white inline-block px-4 py-2 comic-border transform -rotate-1">
                קראו את המקרה ולחצו על הכפתור הנכון למעלה 👆
            </p>
            <div id="scoreDisplay" class="text-2xl font-black bg-green-400 px-6 py-2 comic-border transform rotate-2 text-black" style="box-shadow: 4px 4px 0px #000;">
                נקודות: 0
            </div>
        </div>
    </header>

    <!-- מקרא המושגים (עכשיו הם כפתורים לחיצים!) -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 max-w-5xl mx-auto w-full relative z-20">
        <button onclick="checkAnswer(1)" class="btn-comic bg-red-400 text-white p-3 font-bold text-xl flex items-center justify-center comic-border transform rotate-1">
            <span class="number-badge">1</span> התאדות
        </button>
        <button onclick="checkAnswer(2)" class="btn-comic bg-blue-400 text-white p-3 font-bold text-xl flex items-center justify-center comic-border transform -rotate-1">
            <span class="number-badge">2</span> התעבות
        </button>
        <button onclick="checkAnswer(3)" class="btn-comic bg-orange-400 text-white p-3 font-bold text-xl flex items-center justify-center comic-border transform rotate-1">
            <span class="number-badge">3</span> התכה
        </button>
        <button onclick="checkAnswer(4)" class="btn-comic bg-purple-400 text-white p-3 font-bold text-xl flex items-center justify-center comic-border transform -rotate-1">
            <span class="number-badge">4</span> התמצקות
        </button>
    </div>

    <!-- אזור הקלף (כבר לא לחיץ ישירות) -->
    <main class="flex-grow flex flex-col justify-center items-center relative z-10">
        
        <div id="cardContainer" class="card-container mb-8">
            <div class="card-inner">
                <!-- קדמת הקלף (השאלה) -->
                <div class="card-front">
                    <div class="text-3xl mb-4 text-blue-600 flex items-center justify-center gap-2">
                        <span>המקרה:</span>
                        <span>❓</span>
                    </div>
                    <div id="scenarioText" class="text-2xl md:text-3xl font-bold leading-snug">
                        לחצו על "שלוף קלף" כדי להתחיל במשחק!
                    </div>
                    <div id="instructionHint" class="mt-4 text-lg font-bold text-gray-600 bg-gray-100 px-4 py-2 rounded-full border-2 border-dashed border-gray-400">
                        אחרי שקראתם, לחצו על התשובה הנכונה למעלה!
                    </div>
                </div>
                <!-- גב הקלף (התשובה - מתגלה רק כשצודקים) -->
                <div class="card-back">
                    <div class="text-4xl mb-2 text-green-600 font-black" style="text-shadow: 1px 1px 0 #000;">כל הכבוד! הצלחתם! 🏆</div>
                    <div class="text-2xl mb-4 font-bold">התהליך הנכון הוא:</div>
                    <div class="flex items-center justify-center gap-4">
                        <div id="answerNumber" class="text-5xl font-black text-white bg-black rounded-full w-20 h-20 flex items-center justify-center border-4 border-white shadow-lg"></div>
                        <div id="answerName" class="text-4xl font-bold text-blue-900 comic-title" style="text-shadow: 2px 2px 0 #fff;"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- כפתורי שליטה -->
        <div class="flex gap-4 relative z-20">
            <button id="drawBtn" onclick="drawCard()" class="btn-comic bg-yellow-400 hover:bg-yellow-500 text-black font-black text-2xl py-4 px-8 border-4 border-black rounded-xl" style="box-shadow: 6px 6px 0px #000;">
                שלוף קלף חדש! 🃏
            </button>
        </div>

    </main>

    <!-- הודעות קופצות על המסך -->
    <div id="feedbackMessage" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-6xl font-black pointer-events-none opacity-0 transition-opacity duration-300 z-50 comic-title" style="text-shadow: 4px 4px 0px #000;"></div>

    <script>
        // מאגר השאלות
        const deck = [
            { text: "קניתי ארטיק קרח בים, אבל פגשתי חבר ודיברנו. כשרציתי לאכול, נשאר לי רק מיץ מתוק ביד.", answerNum: 3, answerText: "התכה" },
            { text: "אחרי מקלחת במים חמים, רציתי להסתכל במראה, אבל היא הייתה מכוסה בטיפות קטנות של מים.", answerNum: 2, answerText: "התעבות" },
            { text: "הכנתי מיץ פטל מתוק, מזגתי לתבנית מיוחדת והשארתי בפריזר למשך הלילה.", answerNum: 4, answerText: "התמצקות" },
            { text: "שכחתי שלולית של מים בחצר, ואחרי כמה שעות של שמש חזקה השלולית נעלמה לגמרי!", answerNum: 1, answerText: "התאדות" },
            { text: "שעווה של נר טפטפה על השולחן. בהתחלה היא הייתה נוזלית וחמה, אבל אחרי דקה היא הפכה לקשה.", answerNum: 4, answerText: "התמצקות" },
            { text: "שאלת אתגר: הוצאתי בקבוק קפוא מהמקרר והנחתי על השולחן. פתאום הבקבוק התחיל 'להזיע' מבחוץ. למה?", answerNum: 2, answerText: "התעבות" }
        ];

        let currentIndex = -1;
        let isFlipped = false;
        let answeredCorrectly = false;
        let score = 0;
        
        // מערבבים את הקלפים בתחילת המשחק
        let shuffledDeck = [...deck].sort(() => Math.random() - 0.5);

        // פונקציה לשליפת קלף חדש
        function drawCard() {
            const container = document.getElementById('cardContainer');
            
            // איפוס מצב הקלף
            answeredCorrectly = false;
            document.getElementById('instructionHint').innerText = "אחרי שקראתם, לחצו על התשובה הנכונה למעלה!";
            document.getElementById('instructionHint').classList.remove('bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
            document.getElementById('instructionHint').classList.add('bg-gray-100', 'text-gray-600');
            
            // אם הקלף הפוך, הופכים אותו חזרה ואז מחליפים שאלה
            if (isFlipped) {
                container.classList.remove('flipped');
                isFlipped = false;
                setTimeout(() => {
                    nextCard();
                }, 400); // ממתינים שהקלף יתהפך
            } else {
                nextCard();
            }
        }

        function nextCard() {
            currentIndex++;
            
            // אם סיימנו את כל הקלפים
            if (currentIndex >= shuffledDeck.length) {
                alert("כל הכבוד! סיימתם את כל השאלות. נערבב את הקלפים מחדש!");
                shuffledDeck = [...deck].sort(() => Math.random() - 0.5);
                currentIndex = 0;
            }

            const card = shuffledDeck[currentIndex];
            
            // עדכון המלל בקלף
            document.getElementById('scenarioText').innerText = card.text;
            document.getElementById('answerNumber').innerText = card.answerNum;
            document.getElementById('answerName').innerText = card.answerText;
            
            // אנימציית קפיצה קלה
            const container = document.getElementById('cardContainer');
            container.style.transform = 'scale(0.95)';
            setTimeout(() => {
                container.style.transform = 'scale(1)';
            }, 150);
        }

        // פונקציה לבדיקת התשובה (מופעלת מלחיצה על הכפתורים העליונים)
        function checkAnswer(selectedNum) {
            // אם עוד לא שלפו קלף
            if (currentIndex === -1) {
                showFeedback("קודם שלפו קלף! 🃏", "text-yellow-400");
                const drawBtn = document.getElementById('drawBtn');
                drawBtn.classList.add('celebrate');
                setTimeout(() => drawBtn.classList.remove('celebrate'), 500);
                return;
            }

            // אם כבר ענו נכון על הקלף הזה
            if (answeredCorrectly) {
                showFeedback("כבר עניתם נכון! שלפו קלף חדש", "text-blue-400");
                return;
            }

            const card = shuffledDeck[currentIndex];
            const container = document.getElementById('cardContainer');
            const hint = document.getElementById('instructionHint');

            // בדיקה אם המספר שנבחר תואם לתשובה
            if (selectedNum === card.answerNum) {
                // תשובה נכונה!
                answeredCorrectly = true;
                isFlipped = true;
                
                // עדכון נקודות
                score += 10;
                const scoreDisplay = document.getElementById('scoreDisplay');
                scoreDisplay.innerText = `נקודות: ${score}`;
                scoreDisplay.classList.add('celebrate');
                setTimeout(() => scoreDisplay.classList.remove('celebrate'), 500);

                // הפיכת הקלף
                container.classList.add('flipped');
                
                // משוב חיובי
                showFeedback("נכון מאוד! 🌟", "text-green-400");
                
            } else {
                // תשובה שגויה
                // הפעלת אנימציית רעידה
                container.classList.remove('shake-animation'); // איפוס במקרה שכבר רעד
                void container.offsetWidth; // טריק לאיפוס אנימציה ב-CSS
                container.classList.add('shake-animation');
                
                // עדכון משוב טקסטואלי
                hint.innerText = "אופס! נסו שוב... 🙈";
                hint.classList.remove('bg-gray-100', 'text-gray-600');
                hint.classList.add('bg-red-100', 'text-red-800');
                
                showFeedback("טעות! נסו שוב", "text-red-500");
            }
        }

        // פונקציה להצגת טקסט ענק במרכז המסך שנעלם
        function showFeedback(text, colorClass) {
            const feedback = document.getElementById('feedbackMessage');
            feedback.innerText = text;
            feedback.className = `fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-5xl md:text-7xl font-black pointer-events-none z-50 comic-title ${colorClass} transition-opacity duration-300 opacity-100`;
            
            setTimeout(() => {
                feedback.classList.remove('opacity-100');
                feedback.classList.add('opacity-0');
            }, 1200);
        }
    </script>
</body>
</html>
